<style>

  body{margin:0;background:var(--bg);color:var(--text);

  .card{background:var(--surface);border:1px solid var(--border);

  .muted{color:var(--muted)}
  .btn{background:var(--accent);color:#fff;border:0;border-radius:var(--radius);
